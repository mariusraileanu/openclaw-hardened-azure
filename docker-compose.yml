services:
  openclaw:
    env_file: config/env/dev.env
    environment:
      # Inject user profile + board config for local dev (no USER_SLUG needed).
      # render_workspaces.py uses the user section to generate USER.md and skip BOOTSTRAP.md.
      # Skills and plugins come from default.json; only user-specific overrides here.
      - OPENCLAW_FEATURES_JSON={"user":{"name":"Marius Raileanu","preferredName":"Marius","timezone":"Asia/Dubai","role":"Managing Director, Digital Health","notes":["Prefers concise answers with clear next steps","Assume technical audience"]},"boards":{"enabled":["fertility","strategic-health"]},"skills":{"chairman":{"allow":["board-deliberation","board-meeting-execution"]},"members":{"allow":["board-deliberation"]}},"plugins":{"enable":["board-router"]}}
      # M365 gateway running on the host (macOS Docker → host.docker.internal).
      - GRAPH_MCP_URL=http://host.docker.internal:18790
      # Tavily web search (leave empty to disable; fill in to enable).
      - TAVILY_API_KEY=
      # Wipe sessions on every restart so stale context never persists.
      - OPENCLAW_FRESH_SESSION=true
    build:
      context: .
      dockerfile: Dockerfile.wrapper
    image: openclaw-golden:local
    cpus: 8.0
    mem_limit: 16g
    ports:
      - "127.0.0.1:18789:18789"
    # Environment variables are loaded from env_file above.
    # Shell overrides still work: COMPASS_API_KEY=xxx docker compose up
    volumes:
      # Single-container volume — not shared across containers (KICS info-level false positive)
      - openclaw-data:/app/data
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:18789/ || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '8.0'
          memory: 16g

volumes:
  openclaw-data:
